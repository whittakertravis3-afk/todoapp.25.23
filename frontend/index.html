<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-to-app</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-dark min-vh-100 d-flex justify-content-center">
    <div class="container my-5">
      <!-- create a task form -->
      <h2 class="mb-3 text-white">Create Task</h2>
      <form id="newTaskForm" class="bg-body-secondary p-3 rounded">
        <div class="d-flex flex-wrap gap-3">
          <div class="form-group flex-grow-1">
            <label for="title" class="form-label">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              class="form-control"
              placeholder="Task Title"
              required
            />
          </div>

          <!-- date / cally -->
          <div class="form-group">
            <label for="dueDate" class="form-label">Due Date</label>
            <input
              type="date"
              id="dueDate"
              name="dueDate"
              class="form-control"
              required
            />
          </div>

          <!-- submit button -->
          <!-- like blue / but green -->
          <div class="d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Create +</button>
          </div>
        </div>
      </form>

      <!-- filter bar -->
      <!-- like the colour flow -->
      <div
        class="d-flex gap-3 align-items-center mt-5 p-3 bg-gradient"
        id="filterBar"
      >
        <select id="taskFilter" class="form-select form-select-sm w-auto">
          <option value="">All tasks</option>
          <option value="false">Incomplete</option>
          <option value="true">Complete</option>
        </select>

        <div class="form-check">
          <input type="checkbox" id="sortDueDate" class="form-check-input" />
          <label for="sortDueDate" class="form-check-label text-white"
            >Sort By Due Date</label
          >
        </div>
      </div>

      <!-- to do list -->
      <!-- change to blue/ add hover look -->
      <div class="table-responsive mt-3">
        <table class="table table-hover table-dark">
          <thead>
            <tr>
              <th scope="col">Task</th>
              <th scope="col">Due Date</th>
              <th scope="col" class="text-end">Actions</th>
            </tr>
          </thead>

          <!-- populated by JavaScript -->
          <tbody id="taskList"></tbody>
        </table>
      </div>
      <!-- footer -->
      <footer
        class="text-center text-white mt-5 py-3 border-top border-secondary"
      >
        <p class="mb-1">
          <i class="bi bi-check2-square"></i>
          My To-Do App
        </p>

        <small class="text-secondary">
          Built with HTML, Bootstrap, JavaScript & MongoDB
        </small>
      </footer>

      <!-- use at the end of lessons -->
      <!-- pop up edit modal -->
      <div class="modal fade" id="editModal">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Edit Task</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <input
                type="text"
                id="editTitle"
                placeholder="Title"
                class="form-control mb-3"
              />
              <input type="date" id="editDate" class="form-control" />
            </div>
            <div class="modal-footer">
              <button class="btn btn-primary" onclick="editTask()">
                Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js/script.js"></script>
  </body>
</html>
